<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    .card {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 15px;
      max-width: 300px;
    }
    .card img {
      width: 100%;
      height: auto;
      border-radius: 5px;
    }
    .card-title {
      font-size: 1.5em;
      margin-top: 10px;
    }
    .card-desc {
      font-size: 1em;
      margin-top: 10px;
    }
    .card-btn {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
    }
    .card-btn:hover {
      background-color: #0056b3;
    }
    </style>
</head>
<body>
<h1>My Portfolio</h1>
<p>Welcome to my website!</p>
<h2>About Me</h2>
<div class="card">
  <img src="https://via.placeholder.com/300x150" alt="Card Image">
  <h3 class="card-title">Card Title</h3>
  <p class="card-desc">This is a description text inside the card. It explains what the card is about.</p>
  <button class="card-btn">Click Me</button>
</div>
