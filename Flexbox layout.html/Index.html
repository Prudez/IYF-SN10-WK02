<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex & Grid Demo</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ===== Flexbox Navigation ===== -->
  <header class="navbar">
    <div class="logo">MyLogo</div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Projects</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- ===== Flexbox Card Row ===== -->
  <main>
    <section class="card-row">
      <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Card 1">
        <div class="card-title">Card 1</div>
        <div class="card-desc">This is a description for card 1.</div>
        <button class="card-btn">Learn More</button>
      </div>
      <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Card 2">
        <div class="card-title">Card 2</div>
        <div class="card-desc">This is a description for card 2.</div>
        <button class="card-btn">Learn More</button>
      </div>
      <div class="card">
        <img src="https://via.placeholder.com/300x150" alt="Card 3">
        <div class="card-title">Card 3</div>
        <div class="card-desc">This is a description for card 3.</div>
        <button class="card-btn">Learn More</button>
      </div>
    </section>

    <!-- ===== Grid Gallery ===== -->
    <section class="photo-gallery">
      <img src="https://via.placeholder.com/300" alt="Image 1">
      <img src="https://via.placeholder.com/300" alt="Image 2">
      <img src="https://via.placeholder.com/300" alt="Image 3">
      <img src="https://via.placeholder.com/300" alt="Image 4">
      <img src="https://via.placeholder.com/300" alt="Image 5">
      <img src="https://via.placeholder.com/300" alt="Image 6">
    </section>
  </main>

  <!-- ===== Flexbox Footer ===== -->
  <footer class="footer">
    <div class="footer-columns">
      <div class="about">
        <h4>About</h4>
        <p>Information about the site.</p>
      </div>
      <div class="links">
        <h4>Links</h4>
        <p><a href="#">Home</a> | <a href="#">Projects</a></p>
      </div>
      <div class="contact">
        <h4>Contact</h4>
        <p>Email: example@email.com</p>
      </div>
    </div>
    <div class="copyright">© 2026 My Portfolio</div>
  </footer>

</body>
</html>
